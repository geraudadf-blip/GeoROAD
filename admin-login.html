<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — GeoROAD TOGO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--gold:#C8A64B;--gold-dark:#A68A3A;--gold-light:#D4B96A;--gold-pale:rgba(200,166,75,.10);--cream:#F8F6F0;--cream-2:#F0EDE4;--cream-3:#E8E4D9;--cream-border:#DDD8CA;--text:#2C2A24;--text-2:#5C5850;--text-3:#8B8578;--text-4:#A9A49A;--white:#FFF;--shadow:rgba(44,42,36,.06);--shadow-md:rgba(44,42,36,.1);--shadow-lg:rgba(44,42,36,.16);--red:#B85C38;--green:#5E6E54}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;line-height:1.6}
a{text-decoration:none;color:inherit}
.login-wrapper{width:100%;max-width:420px;padding:20px}
.login-card{background:var(--white);border-radius:20px;border:1px solid var(--cream-border);box-shadow:0 4px 40px var(--shadow-md);padding:48px 36px 40px;text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.login-logo img{width:40px;height:40px;border-radius:10px;object-fit:contain}
.login-logo span{font-size:1.2rem;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.login-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:50px;border:1px solid var(--cream-border);background:var(--gold-pale);font-size:.68rem;letter-spacing:2px;color:var(--text-3);margin-bottom:28px;font-weight:500;text-transform:uppercase}
.login-badge i{color:var(--gold);font-size:.55rem}
.login-title{font-size:1.6rem;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.login-subtitle{font-size:.88rem;color:var(--text-3);font-weight:300;margin-bottom:32px}
.form-group{margin-bottom:20px;text-align:left}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--text-2);margin-bottom:6px;letter-spacing:.3px}
.input-wrapper{position:relative}
.input-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-4);font-size:.88rem;transition:color .3s}
.input-wrapper input{width:100%;padding:13px 14px 13px 42px;border:1.5px solid var(--cream-border);border-radius:12px;font-family:'Outfit',sans-serif;font-size:.92rem;color:var(--text);background:var(--cream);transition:all .3s;outline:none}
.input-wrapper input:focus{border-color:var(--gold);background:var(--white);box-shadow:0 0 0 3px var(--gold-pale)}
.input-wrapper input:focus+i,.input-wrapper input:focus~i{color:var(--gold)}
.input-wrapper input::placeholder{color:var(--text-4);font-weight:300}
.form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;font-size:.78rem}
.form-options label{display:flex;align-items:center;gap:6px;color:var(--text-3);cursor:pointer}
.form-options label input{accent-color:var(--gold);width:15px;height:15px}
.form-options a{color:var(--gold-dark);font-weight:500;transition:color .3s}
.form-options a:hover{color:var(--gold)}
.btn-login{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--white);font-weight:600;font-size:.95rem;border:none;cursor:pointer;transition:transform .3s,box-shadow .3s;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,166,75,.35)}
.btn-login:active{transform:translateY(0)}
.login-error{display:none;margin-top:16px;padding:10px 14px;border-radius:10px;background:rgba(184,92,56,.08);border:1px solid rgba(184,92,56,.2);color:var(--red);font-size:.82rem;font-weight:500}
.login-error.show{display:flex;align-items:center;gap:8px}
.login-footer{margin-top:28px;text-align:center}
.login-footer a{display:inline-flex;align-items:center;gap:6px;color:var(--text-3);font-size:.82rem;font-weight:500;transition:color .3s}
.login-footer a:hover{color:var(--gold-dark)}
.login-footer a i{font-size:.72rem}
.login-bg-pattern{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(200,166,75,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(200,166,75,.03) 1px,transparent 1px);background-size:50px 50px}
.login-bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(200,166,75,.06) 0%,transparent 70%);z-index:-1;top:50%;left:50%;transform:translate(-50%,-50%)}
@media(max-width:768px){body{align-items:flex-start;overflow-y:auto;padding:18px 0}.login-card{padding:34px 22px 30px;border-radius:18px}.form-options{flex-direction:column;align-items:flex-start;gap:12px;margin-bottom:20px}.login-footer{margin-top:22px}}
@media(max-width:480px){.login-card{padding:32px 20px 28px;border-radius:16px}.login-title{font-size:1.3rem}.login-subtitle{font-size:.84rem;margin-bottom:24px}.login-wrapper{padding:14px}}
</style>
</head>
<body>
<div class="login-bg-pattern"></div>
<div class="login-bg-glow"></div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <img src="resources/logo.png" alt="Logo">
      <span>GeoROAD TOGO</span>
    </div>
    <div class="login-badge"><i class="fas fa-circle"></i> Espace Administration</div>
    <h1 class="login-title">Connexion</h1>
    <p class="login-subtitle">Accédez au panneau de gestion du réseau routier</p>

    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>Identifiant</label>
        <div class="input-wrapper">
          <input type="text" id="login-user" placeholder="Nom d'utilisateur" autocomplete="username" required>
          <i class="fas fa-user"></i>
        </div>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <input type="password" id="login-pass" placeholder="Mot de passe" autocomplete="current-password" required>
          <i class="fas fa-lock"></i>
        </div>
      </div>
      <div class="form-options">
        <label><input type="checkbox" checked> Se souvenir</label>
        <a href="#">Mot de passe oublié ?</a>
      </div>
      <button type="submit" class="btn-login">
        Se connecter <i class="fas fa-arrow-right"></i>
      </button>
      <div class="login-error" id="login-error">
        <i class="fas fa-exclamation-circle"></i>
        <span>Identifiants incorrects. Veuillez réessayer.</span>
      </div>
    </form>

    <div class="login-footer">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Retour au site public</a>
    </div>
  </div>
</div>

<script src="bundle/utils.js?v=2"></script>
<script src="bundle/sig-core.js?v=5"></script>
<script>
/**
 * GeoROAD TOGO — Authentification Admin
 * 
 * Module de connexion simplifié.
 * Architecture préparée pour une intégration future avec :
 * - PostgreSQL/PostGIS (stockage utilisateurs)
 * - JWT / Session server-side
 * - Rôles et permissions (RBAC)
 * 
 * Pour le moment : authentification locale côté client
 * avec stockage sessionStorage pour la session courante.
 */
(function() {
  'use strict';
  var SESSION_KEY = 'georoad_auth';
  var USERS_KEY = 'georoad_users';
  var LOGIN_HISTORY_KEY = 'georoad_login_history';
  var ADMIN_USERNAME = 'GeoROAD';
  var ADMIN_PASSWORD = 'georoad@2026';
  var ADMIN_NAME = 'GeoROAD';
  var ADMIN_EMAIL = 'admin@georoad.tg';
  var LEGACY_ADMIN_PASSWORD = 'georoad2025';
  var DEFAULT_ADMIN = {
    id: 1,
    username: ADMIN_USERNAME,
    password: ADMIN_PASSWORD,
    role: 'administrateur',
    name: ADMIN_NAME,
    email: ADMIN_EMAIL,
    status: 'actif',
    mustChangePassword: false,
    lastLogin: null,
    lastActivity: null,
    createdAt: '2025-01-01'
  };

  function clone(data) {
    try { return JSON.parse(JSON.stringify(data)); }
    catch(e) { return data; }
  }

  function normalizeUsers(users) {
    var list = Array.isArray(users) ? clone(users) : [];
    var hasAdmin = false;

    list = list.filter(function(user) {
      return user && typeof user === 'object';
    }).map(function(user, idx) {
      if (!user.id) user.id = idx + 1;
      user.username = String(user.username || ('utilisateur_' + user.id)).trim();
      user.name = user.name || user.username;
      user.email = user.email || (user.username + '@georoad.tg');
      user.role = user.role || 'utilisateur_public';
      user.status = user.status || 'actif';
      if (typeof user.password === 'undefined') user.password = '';
      if (typeof user.mustChangePassword === 'undefined') user.mustChangePassword = false;

      if (user.username.toLowerCase() === 'admin') {
        user.username = ADMIN_USERNAME;
      }

      if (user.username.toLowerCase() === ADMIN_USERNAME.toLowerCase()) {
        hasAdmin = true;
        user.name = ADMIN_NAME;
        user.role = 'administrateur';
        user.status = 'actif';
        user.email = ADMIN_EMAIL;
        if (!user.password || user.password === LEGACY_ADMIN_PASSWORD) {
          user.password = DEFAULT_ADMIN.password;
        }
      }
      return user;
    });

    var seenUsernames = {};
    list = list.filter(function(user) {
      var key = String(user.username || '').toLowerCase();
      if (!key) return false;
      if (seenUsernames[key]) return false;
      seenUsernames[key] = true;
      return true;
    });

    if (!hasAdmin) list.unshift(clone(DEFAULT_ADMIN));
    return list;
  }

  function loadUsers() {
    var users = null;
    try {
      var data = localStorage.getItem(USERS_KEY);
      if (data) users = JSON.parse(data);
    } catch(e) {}
    users = normalizeUsers(users || [DEFAULT_ADMIN]);
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
    return users;
  }

  function saveUsers(users) {
    localStorage.setItem(USERS_KEY, JSON.stringify(normalizeUsers(users)));
  }

  function findUser(username) {
    var uname = String(username || '').trim().toLowerCase();
    return loadUsers().find(function(user) {
      return String(user.username || '').toLowerCase() === uname;
    }) || null;
  }

  function recordLogin(user, success, message) {
    var history = [];
    try {
      history = JSON.parse(localStorage.getItem(LOGIN_HISTORY_KEY)) || [];
    } catch(e) {}

    history.unshift({
      userId: user && user.id ? user.id : null,
      username: user && user.username ? user.username : document.getElementById('login-user').value.trim(),
      timestamp: new Date().toISOString(),
      success: !!success,
      ip: 'local'
    });
    if (history.length > 200) history = history.slice(0, 200);
    localStorage.setItem(LOGIN_HISTORY_KEY, JSON.stringify(history));

    if (success && user) {
      var users = loadUsers();
      users.forEach(function(item) {
        if (item.id === user.id) {
          item.lastLogin = new Date().toISOString();
          item.lastActivity = new Date().toISOString();
        }
      });
      saveUsers(users);
    }

    if (typeof SIGAuditTrail !== 'undefined') {
      try {
        SIGAuditTrail.log(success ? SIGAuditTrail.ACTIONS.LOGIN : SIGAuditTrail.ACTIONS.LOGIN_FAILED, {
          user: (user && user.username) || document.getElementById('login-user').value.trim() || 'Inconnu',
          featureId: user && user.id ? String(user.id) : null,
          featureName: (user && user.username) || null,
          details: message,
          result: success ? 'SUCCESS' : 'FAILURE',
          entityType: 'user'
        });
      } catch(e) {}
    }
  }

  function authenticate(username, password) {
    var user = findUser(username);
    if (!user) {
      return { ok: false, message: 'Identifiants incorrects.' };
    }
    if (user.status !== 'actif') {
      return { ok: false, user: user, message: 'Ce compte est désactivé.' };
    }
    if (String(user.role || '').toLowerCase() !== 'administrateur') {
      return { ok: false, user: user, message: 'Ce compte n’a pas accès à l’administration.' };
    }
    if (String(user.password || '') !== String(password || '')) {
      return { ok: false, user: user, message: 'Identifiants incorrects.' };
    }
    return { ok: true, user: user };
  }

  /**
   * Tente une connexion avec les identifiants fournis.
   * @param {Event} e - Événement de soumission du formulaire
   * @returns {boolean} false pour empêcher le rechargement
   */
  window.handleLogin = function(e) {
    e.preventDefault();
    var user = document.getElementById('login-user').value.trim();
    var pass = document.getElementById('login-pass').value;
    var errorEl = document.getElementById('login-error');

    var result = authenticate(user, pass);
    if (result.ok) {
      var found = result.user;
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({
        authenticated: true,
        user: found.username,
        userId: found.id,
        role: found.role,
        name: found.name,
        mustChangePassword: !!found.mustChangePassword,
        loginTime: new Date().toISOString()
      }));
      recordLogin(found, true, 'Connexion réussie à l’administration');
      window.location.href = 'admin.html';
    } else {
      recordLogin(result.user || { username: user }, false, result.message);
      errorEl.querySelector('span').textContent = result.message;
      errorEl.classList.add('show');
      document.getElementById('login-pass').value = '';
      setTimeout(function() { errorEl.classList.remove('show'); }, 4000);
    }
    return false;
  };

  /* Si déjà connecté, rediriger vers le dashboard */
  try {
    var existing = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (existing && existing.authenticated && String(existing.role || '').toLowerCase() === 'administrateur') {
      window.location.href = 'admin.html';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
